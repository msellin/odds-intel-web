name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/odds-intel-web
            git pull origin main
            npm ci --prefer-offline
            npm run build
            pm2 restart odds-intel-web
            echo "Deploy complete at $(date)"
